<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator Kode Harga</title>
<style>
body{font-family:Arial,sans-serif;background:#f5f5f5;padding:20px}
.card{max-width:500px;margin:auto;background:white;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
input{width:100%;padding:12px;font-size:24px;text-transform:uppercase;box-sizing:border-box}
.hasil{margin-top:20px;text-align:center}
.angka{font-size:42px;font-weight:bold}
.harga{font-size:28px;color:#333}
small{color:#666}
</style>
</head>
<body>
<div class="card">
<h2>Kalkulator Kode Harga</h2>
<p><b>CINTAROSUL = 1234567890</b></p>
<input id="kode" placeholder="Contoh: TAO" oninput="konversi()">
<div class="hasil">
<div class="angka" id="angka">-</div>
<div class="harga" id="harga">-</div>
</div>
<small>Ketik 2 atau 3 huruf, hasil langsung muncul otomatis.</small>
</div>

<script>
const peta = {
C:'1',I:'2',N:'3',T:'4',A:'5',
R:'6',O:'7',S:'8',U:'9',L:'0'
};

function konversi(){
 let kode=document.getElementById('kode').value.toUpperCase();
 let hasil='';

 for(let i=0;i<kode.length;i++){
   if(peta[kode[i]]) hasil += peta[kode[i]];
 }

 document.getElementById('angka').innerText = hasil || '-';

 if(hasil){
   document.getElementById('harga').innerText =
     'Rp ' + Number(hasil).toLocaleString('id-ID') + '.000';
 }else{
   document.getElementById('harga').innerText='-';
 }
}
</script>
</body>
</html>
